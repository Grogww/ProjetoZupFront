# Template processado por envsubst no start do container.
# Apenas ${BACKEND_URL} (variável de ambiente) é substituída;
# as variáveis do Nginx ($uri, $host, ...) são preservadas.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Permite uploads de mídia (multipart) sem estourar o limite padrão.
    client_max_body_size 25m;

    # Compressão dos assets de texto.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      application/xml text/xml image/svg+xml font/woff2;

    # Proxy reverso da API: mesma origem que o front => sem CORS.
    # O front chama "/api/..."; aqui repassamos ao backend real (ProjetoZup),
    # que também expõe as rotas sob "/api".
    location /api/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Mídias das ocorrências: o backend (ProjetoZup) serve os arquivos em
    # "/uploads/..." na raiz (fora de "/api"). Sem este proxy, o pedido da imagem
    # cairia no fallback de SPA e o Nginx devolveria index.html no lugar do arquivo
    # — a <img> quebraria silenciosamente.
    location /uploads/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Arquivos têm hash no nome (imutáveis) — pode cachear com folga.
        expires    30d;
        add_header Cache-Control "public";
    }

    # Cache agressivo para assets com hash no nome (immutable).
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback de SPA: qualquer rota desconhecida volta para o index.html,
    # senão recarregar /mapa, /gestao, etc. daria 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
